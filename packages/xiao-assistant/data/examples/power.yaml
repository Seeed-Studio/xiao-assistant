- id: deep-sleep-esp32-arduino
  title: Deep Sleep with Timer Wake
  description: Enter deep sleep and wake up after a timer interval to save power
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6]
  category: power
  tags: [deep sleep, low power, timer, wake, esp32, battery, energy saving]
  code: |
    // Deep Sleep - XIAO ESP32 Series
    // Wake up after 10 seconds via timer

    #define uS_TO_S_FACTOR 1000000ULL
    #define TIME_TO_SLEEP  10  // Sleep time in seconds

    void setup() {
      Serial.begin(115200);
      delay(1000);

      Serial.println("XIAO ESP32 Deep Sleep Example");
      Serial.printf("Going to sleep for %d seconds...\n", TIME_TO_SLEEP);

      esp_sleep_enable_timer_wakeup(TIME_TO_SLEEP * uS_TO_S_FACTOR);
      esp_deep_sleep_start();
    }

    void loop() {
      // Never reached - deep sleep resets the board on wake
    }
