- id: hardware-interrupts-esp32-arduino
  title: Hardware Interrupts
  description: Use hardware interrupts to respond to pin state changes immediately
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350]
  category: advanced
  tags: [interrupt, hardware, isr, gpio, edge, real-time, priority]
  code: |
    // Hardware Interrupts - XIAO ESP32/RP2040
    // Demonstrates rising, falling, and change edge interrupts
    #define ENCODER_A 2   // Rotary encoder pin A
    #define ENCODER_B 3   // Rotary encoder pin B
    #define BUTTON_PIN 0  // Push button

    volatile long encoderCount = 0;
    volatile bool buttonPressed = false;
    volatile unsigned long lastInterruptTime = 0;

    // Encoder ISR - fires on pin A rising edge
    void IRAM_ATTR encoderISR() {
      unsigned long now = micros();
      if (now - lastInterruptTime < 500) return;  // Debounce 500us
      lastInterruptTime = now;

      if (digitalRead(ENCODER_B)) {
        encoderCount--;
      } else {
        encoderCount++;
      }
    }

    // Button ISR - fires on falling edge (button press)
    void IRAM_ATTR buttonISR() {
      buttonPressed = true;
    }

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }

      pinMode(ENCODER_A, INPUT_PULLUP);
      pinMode(ENCODER_B, INPUT_PULLUP);
      pinMode(BUTTON_PIN, INPUT_PULLUP);

      // Attach interrupts
      attachInterrupt(digitalPinToInterrupt(ENCODER_A), encoderISR, RISING);
      attachInterrupt(digitalPinToInterrupt(BUTTON_PIN), buttonISR, FALLING);

      Serial.println("Hardware Interrupt Example");
      Serial.println("Rotate encoder or press button on pin 0");
    }

    void loop() {
      static long lastCount = 0;
      static unsigned long lastPrint = 0;

      if (millis() - lastPrint > 200) {
        lastPrint = millis();
        if (encoderCount != lastCount) {
          Serial.printf("Encoder: %ld\n", encoderCount);
          lastCount = encoderCount;
        }
      }

      if (buttonPressed) {
        Serial.println("Button pressed! Resetting encoder.");
        encoderCount = 0;
        buttonPressed = false;
      }
    }
  requirements: []
