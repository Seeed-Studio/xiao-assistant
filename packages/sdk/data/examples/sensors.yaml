- id: i2c-scanner-arduino
  title: I2C Scanner
  description: Scan the I2C bus and list all connected devices
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [i2c, scanner, wire, bus, debug, address]
  code: |
    // I2C Scanner - XIAO Boards
    #include <Wire.h>

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }
      Serial.println("\nI2C Scanner");

      Wire.begin();
    }

    void loop() {
      Serial.println("Scanning...");

      int deviceCount = 0;
      for (byte address = 1; address < 127; address++) {
        Wire.beginTransmission(address);
        byte error = Wire.endTransmission();

        if (error == 0) {
          Serial.printf("Device found at 0x%02X\n", address);
          deviceCount++;
        }
      }

      if (deviceCount == 0) {
        Serial.println("No I2C devices found!");
      } else {
        Serial.printf("Found %d device(s)\n", deviceCount);
      }

      delay(5000);
    }
  requirements: []
  wikiUrl: https://wiki.seeedstudio.com/SeeedStudio_XIAO_Series_Introduction/

- id: dht11-arduino
  title: DHT11 Temperature & Humidity
  description: Read temperature and humidity from a DHT11 sensor
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [temperature, humidity, dht11, climate, sensor]
  code: |
    // DHT11 Temperature & Humidity Sensor - XIAO
    #include <DHT.h>

    #define DHTPIN 2      // Connect DHT11 data pin to XIAO pin 2
    #define DHTTYPE DHT11

    DHT dht(DHTPIN, DHTTYPE);

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }
      Serial.println("DHT11 Sensor Reading");
      dht.begin();
    }

    void loop() {
      delay(2000);  // DHT11 needs at least 1 second between readings

      float humidity = dht.readHumidity();
      float temperature = dht.readTemperature();

      if (isnan(humidity) || isnan(temperature)) {
        Serial.println("Failed to read from DHT sensor!");
        return;
      }

      float heatIndex = dht.computeHeatIndex(temperature, humidity, false);

      Serial.printf("Temperature: %.1f °C\n", temperature);
      Serial.printf("Humidity: %.1f %%\n", humidity);
      Serial.printf("Heat Index: %.1f °C\n", heatIndex);
      Serial.println("---");
    }
  requirements: [DHT sensor library]
  wikiUrl: https://wiki.seeedstudio.com/Grove-Temperature-Humidity-Sensor-DHT11/

- id: imu-arduino
  title: IMU Sensor (LSM6DS3TR-C)
  description: Read accelerometer and gyroscope data from the onboard IMU on XIAO Sense boards
  language: arduino
  boards: [nrf52840-sense, esp32s3-sense, mg24-sense]
  category: sensors
  tags: [imu, accelerometer, gyroscope, lsm6ds3, motion, sense]
  code: |
    // IMU Sensor - XIAO nRF52840 Sense (LSM6DS3TR-C)
    #include <Adafruit_LSM6DS3TRC.h>

    Adafruit_LSM6DS3TRC lsm6ds3;

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }

      if (!lsm6ds3.begin_I2C()) {
        Serial.println("Failed to find LSM6DS3TR-C chip");
        while (1) { delay(10); }
      }

      Serial.println("LSM6DS3TR-C Found!");
      lsm6ds3.setAccelRange(LSM6DS3_ACCEL_RANGE_2_G);
      lsm6ds3.setGyroRange(LSM6DS3_GYRO_RANGE_250_DPS);
    }

    void loop() {
      sensors_event_t accel, gyro, temp;
      lsm6ds3.getEvent(&accel, &gyro, &temp);

      Serial.printf("Accel X: %.2f, Y: %.2f, Z: %.2f m/s^2\n",
        accel.acceleration.x, accel.acceleration.y, accel.acceleration.z);
      Serial.printf("Gyro X: %.2f, Y: %.2f, Z: %.2f rad/s\n",
        gyro.gyro.x, gyro.gyro.y, gyro.gyro.z);
      Serial.printf("Temp: %.1f °C\n", temp.temperature);
      Serial.println("---");
      delay(100);
    }
  requirements: [Adafruit LSM6DS3TR-C]
  wikiUrl: https://wiki.seeedstudio.com/XIAO-BLE-Sense-Getting-Started/

- id: bme280-arduino
  title: BME280 Environmental Sensor
  description: Read temperature, humidity, and pressure from a BME280 sensor via I2C
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [temperature, humidity, pressure, bme280, i2c, environment, weather]
  code: |
    // BME280 Environmental Sensor - XIAO
    #include <Wire.h>
    #include <Adafruit_BME280.h>

    Adafruit_BME280 bme;

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }

      if (!bme.begin(0x76)) {
        Serial.println("Could not find BME280 sensor at 0x76, trying 0x77...");
        if (!bme.begin(0x77)) {
          Serial.println("BME280 not found! Check wiring.");
          while (1) { delay(10); }
        }
      }

      Serial.println("BME280 sensor initialized");
    }

    void loop() {
      Serial.printf("Temperature: %.2f °C\n", bme.readTemperature());
      Serial.printf("Humidity: %.2f %%\n", bme.readHumidity());
      Serial.printf("Pressure: %.2f hPa\n", bme.readPressure() / 100.0F);
      Serial.printf("Altitude: %.2f m\n", bme.readAltitude(1013.25));
      Serial.println("---");
      delay(2000);
    }
  requirements: [Adafruit BME280 Library, Adafruit Unified Sensor]
  wikiUrl: https://wiki.seeedstudio.com/Grove-Barometer-Sensor-BME280/

- id: aht20-arduino
