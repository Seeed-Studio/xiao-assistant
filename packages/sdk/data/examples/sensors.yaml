- id: ultrasonic-hcsr04-arduino
  title: Ultrasonic Distance (HC-SR04)
  description: Measure distance using an HC-SR04 ultrasonic sensor
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [ultrasonic, distance, hcsr04, sonar, range, proximity]
  code: |
    // Ultrasonic Distance Sensor (HC-SR04) - XIAO
    #define TRIG_PIN 2
    #define ECHO_PIN 3

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }
      pinMode(TRIG_PIN, OUTPUT);
      pinMode(ECHO_PIN, INPUT);
      Serial.println("HC-SR04 Ultrasonic Distance Sensor");
    }

    void loop() {
      // Send trigger pulse
      digitalWrite(TRIG_PIN, LOW);
      delayMicroseconds(2);
      digitalWrite(TRIG_PIN, HIGH);
      delayMicroseconds(10);
      digitalWrite(TRIG_PIN, LOW);

      // Measure echo duration
      long duration = pulseIn(ECHO_PIN, HIGH, 30000);

      if (duration == 0) {
        Serial.println("Out of range");
      } else {
        // Calculate distance in cm (speed of sound = 343 m/s)
        float distanceCm = duration * 0.0343 / 2.0;
        Serial.printf("Distance: %.1f cm\n", distanceCm);
      }

      delay(200);
    }
  requirements: []
  wikiUrl: https://wiki.seeedstudio.com/Grove-Ultrasonic_Ranger/

- id: soil-moisture-arduino
  title: Soil Moisture Sensor
  description: Read soil moisture level from an analog soil moisture sensor
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [soil, moisture, analog, agriculture, gardening, water]
  code: |
    // Soil Moisture Sensor - XIAO
    // Connect sensor analog output to A0

    #define SENSOR_PIN A0
    #define DRY_VALUE 3200    // ADC reading when completely dry
    #define WET_VALUE 1400    // ADC reading when submerged in water

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }
      Serial.println("Soil Moisture Sensor Example");
    }

    void loop() {
      int rawValue = analogRead(SENSOR_PIN);

      // Map to percentage (0% = dry, 100% = wet)
      int moisturePercent = map(rawValue, DRY_VALUE, WET_VALUE, 0, 100);
      moisturePercent = constrain(moisturePercent, 0, 100);

      Serial.printf("Raw ADC: %d | Moisture: %d%%\n", rawValue, moisturePercent);

      if (moisturePercent < 30) {
        Serial.println("Soil is dry - needs watering!");
      } else if (moisturePercent > 70) {
        Serial.println("Soil is very wet");
      } else {
        Serial.println("Soil moisture is good");
      }

      Serial.println("---");
      delay(2000);
    }
  requirements: []
  wikiUrl: https://wiki.seeedstudio.com/Grove-Capacitive-Moisture-Sensor-Corrosion-Resistant/

- id: light-ldr-arduino
  title: Light Sensor (LDR)
  description: Read ambient light level using a light-dependent resistor
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [light, ldr, photoresistor, analog, brightness, ambient]
  code: |
    // Light Sensor (LDR) - XIAO
    // Connect LDR with a voltage divider to A0

    #define LDR_PIN A0

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }
      Serial.println("LDR Light Sensor Example");
      Serial.println("Higher value = more light");
    }

    void loop() {
      int rawValue = analogRead(LDR_PIN);

      // Approximate lux mapping (varies with resistor and LDR)
      // Using a simple linear approximation for demonstration
      float voltage = rawValue * (3.3 / 4095.0);
      int lightPercent = map(rawValue, 0, 4095, 0, 100);

      Serial.printf("Raw: %d | Voltage: %.2f V | Light: %d%%\n",
        rawValue, voltage, lightPercent);

      if (lightPercent < 20) {
        Serial.println("Environment: Dark");
      } else if (lightPercent < 60) {
        Serial.println("Environment: Indoor / Dim");
      } else {
        Serial.println("Environment: Bright / Outdoor");
      }

      Serial.println("---");
      delay(1000);
    }
  requirements: []
  wikiUrl: https://wiki.seeedstudio.com/Grove-Light_Sensor/

- id: pir-motion-arduino
  title: PIR Motion Sensor
  description: Detect motion using a PIR (passive infrared) motion sensor
  language: arduino
  boards: [esp32c3, esp32s3, esp32s3-sense, esp32c6, rp2040, rp2350, nrf52840, nrf52840-sense, samd21, ra4m1, mg24, mg24-sense]
  category: sensors
  tags: [pir, motion, infrared, detection, security, presence]
  code: |
    // PIR Motion Sensor - XIAO
    // Connect PIR output to digital pin D0

    #define PIR_PIN 0
    #define LED_PIN LED_BUILTIN

    volatile bool motionDetected = false;

    void IRAM_ATTR motionISR() {
      motionDetected = true;
    }

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }

      pinMode(PIR_PIN, INPUT);
      pinMode(LED_PIN, OUTPUT);
      digitalWrite(LED_PIN, LOW);

      // PIR sensor needs ~30 seconds to calibrate after power on
      Serial.println("PIR sensor calibrating (30s)...");
      delay(30000);
      Serial.println("PIR sensor ready!");

      attachInterrupt(digitalPinToInterrupt(PIR_PIN), motionISR, RISING);
    }

    void loop() {
      if (motionDetected) {
        Serial.println("Motion detected!");
        digitalWrite(LED_PIN, HIGH);
        delay(2000);
        digitalWrite(LED_PIN, LOW);
        motionDetected = false;
        Serial.println("Armed again");
      }
    }
  requirements: []
  wikiUrl: https://wiki.seeedstudio.com/Grove-PIR_Motion_Sensor/
