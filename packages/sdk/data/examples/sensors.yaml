  code: |
    // AHT20 Temperature & Humidity Sensor - XIAO
    #include <Wire.h>
    #include <Adafruit_AHTX0.h>

    Adafruit_AHTX0 aht;

    void setup() {
      Serial.begin(115200);
      while (!Serial) { delay(10); }

      if (!aht.begin()) {
        Serial.println("Could not find AHT20 sensor! Check wiring.");
        while (1) { delay(10); }
      }

      Serial.println("AHT20 sensor initialized");
